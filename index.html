<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portfólio - Iasmim</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Iasmim</h1>
        <nav>
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#projetos">Projetos</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>

    <section id="sobre">
        <h2>Sobre Mim</h2>
        <img src="https://marginal-aquamarine-1id2dyzxcl.edgeone.app/IMG_20250818_175434_Original.jpeg" width="120" alt="Minha foto">
        <p>
            Meu nome é Iasmim, sou estudante e estou iniciando na área de programação.
            Tenho interesse em tecnologia e desenvolvimento de sites.
        </p>
    </section>

    <section id="projetos">
        <h2>Meus Projetos</h2>
        <div id="lista-projetos"></div>
    </section>

    <section id="contato">
        <h2>Contato</h2>

        <form onsubmit="mostrarMensagem()">
            <input type="text" placeholder="Nome" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Mensagem"></textarea>
            <button type="submit">Enviar</button>
        </form>

    </section>

    </main>

    <footer>
        <p>2026 - Iasmim</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
